name = "lark"
version = "0.1.0"
description = "Lark / Feishu channel plugin for ZeroClaw: webhook ingress + im/v1/messages send over wasi:http."
author = "JordanTheJet"
wasm_path = "lark.wasm"
capabilities = ["channel"]
# http_client: outbound calls to the Lark/Feishu Open Platform
# (open.larksuite.com / open.feishu.cn) — tenant_access_token exchange +
# im/v1/messages send. TLS is performed host-side.
# config_read: read the channel settings (app_id/app_secret/verification_token/
# encrypt_key/api_base_url) from this channel's config section.
permissions = ["http_client", "config_read"]
# provides: mirror the built-in `lark` channel — read [channels.lark.*] and
# honor native-wins. Inert on hosts without the `provides` feature (they load
# this as a novel channel named `lark`, configured from
# [[plugins.entries.lark]]).
provides = "lark"
