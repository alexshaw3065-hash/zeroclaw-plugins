name = "dingtalk"
version = "0.1.0"
description = "DingTalk channel plugin source for ZeroClaw: host-gated adapter scaffold for DingTalk robot messaging."
author = "JordanTheJet"
wasm_path = "dingtalk.wasm"
capabilities = ["channel"]
# Host-gated source: keep the migration source in this repo, but do not publish
# it into registry.json until the native transport/API parity is implemented.
registry = false
# config_read: read [channels.dingtalk.*] when loaded as a mirror plugin.
permissions = ["config_read"]
# provides: mirror the built-in `dingtalk` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "dingtalk"
