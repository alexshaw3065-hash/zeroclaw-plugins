name = "twitch"
version = "0.1.0"
description = "Twitch channel plugin for ZeroClaw: nonblocking IRC chat over a host-mediated TLS socket."
author = "JordanTheJet"
wasm_path = "twitch.wasm"
capabilities = ["channel"]
sender_match = "case-insensitive"
# Real implementation, kept source-only until ZeroClaw's socket-client host
# capability reaches upstream master.
registry = false
# socket_client: Twitch IRC at irc.chat.twitch.tv:6697 over host-managed TLS.
# config_read: read [channels.twitch.*] when loaded as a mirror plugin.
permissions = ["socket_client", "config_read"]
# provides: mirror the built-in `twitch` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "twitch"
