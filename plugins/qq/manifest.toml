name = "qq"
version = "0.1.0"
description = "QQ Official channel plugin source for ZeroClaw: host-gated adapter scaffold for QQ official accounts."
author = "JordanTheJet"
wasm_path = "qq.wasm"
capabilities = ["channel"]
# Host-gated source: keep the migration source in this repo, but do not publish
# it into registry.json until the native transport/API parity is implemented.
registry = false
# config_read: read [channels.qq.*] when loaded as a mirror plugin.
permissions = ["config_read"]
# provides: mirror the built-in `qq` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "qq"
