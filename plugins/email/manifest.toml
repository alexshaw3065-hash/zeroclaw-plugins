name = "email"
version = "0.1.0"
description = "Text-only IMAP/SMTP email channel over host-mediated TCP and implicit TLS."
author = "JordanTheJet"
wasm_path = "email.wasm"
capabilities = ["channel"]
sender_match = "email"
# Real implementation, kept source-only until ZeroClaw's socket-client host
# capability reaches upstream master.
registry = false
# socket_client: host-mediated IMAP and SMTP TCP/TLS.
# config_read: read [channels.email.*] when loaded as a mirror plugin.
permissions = ["socket_client", "config_read"]
# provides: mirror the built-in `email` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "email"
