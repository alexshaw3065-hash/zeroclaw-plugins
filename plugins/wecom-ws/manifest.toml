name = "wecom-ws"
version = "0.1.0"
description = "WeCom WebSocket channel plugin source for ZeroClaw: host-gated WebSocket adapter scaffold."
author = "JordanTheJet"
wasm_path = "wecom_ws.wasm"
capabilities = ["channel"]
# Host-gated source: keep the migration source in this repo, but do not publish
# it into registry.json until the native transport/API parity is implemented.
registry = false
# config_read: read [channels.wecom_ws.*] when loaded as a mirror plugin.
permissions = ["websocket_client", "config_read"]
# provides: mirror the built-in `wecom_ws` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "wecom_ws"
