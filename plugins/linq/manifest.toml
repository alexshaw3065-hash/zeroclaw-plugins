name = "linq"
version = "0.1.0"
description = "Linq channel plugin source for ZeroClaw: host-gated adapter scaffold for Linq messaging."
author = "JordanTheJet"
wasm_path = "linq.wasm"
capabilities = ["channel"]
# Host-gated source: keep the migration source in this repo, but do not publish
# it into registry.json until the native transport/API parity is implemented.
registry = false
# config_read: read [channels.linq.*] when loaded as a mirror plugin.
permissions = ["config_read"]
# provides: mirror the built-in `linq` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "linq"
