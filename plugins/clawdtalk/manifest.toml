name = "clawdtalk"
version = "0.1.0"
description = "ClawdTalk channel plugin source for ZeroClaw: host-gated adapter scaffold for the native ClawdTalk channel."
author = "JordanTheJet"
wasm_path = "clawdtalk.wasm"
capabilities = ["channel"]
# Host-gated source: keep the migration source in this repo, but do not publish
# it into registry.json until the native transport/API parity is implemented.
registry = false
# config_read: read [channels.clawdtalk.*] when loaded as a mirror plugin.
permissions = ["config_read"]
# provides: mirror the built-in `clawdtalk` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "clawdtalk"
