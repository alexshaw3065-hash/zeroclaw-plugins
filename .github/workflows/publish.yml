name: Publish plugin registry

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: publish-plugin-registry
  cancel-in-progress: false

jobs:
  validate:
    name: Validate merged source
    permissions:
      contents: read
    uses: ./.github/workflows/validate.yml

  publish:
    name: Publish validated artifacts
    needs: [validate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Skip a superseded source revision
        id: freshness
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          current_main=$(git rev-parse refs/remotes/origin/main)
          if [[ "$current_main" != "$GITHUB_SHA" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping superseded $GITHUB_SHA; current main is $current_main"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve registry release contract
        if: steps.freshness.outputs.publish == 'true'
        shell: bash
        run: |
          release_tag=$(python3 -c \
            'from tools.registry_contract import PLUGIN_RELEASE_TAG; print(PLUGIN_RELEASE_TAG)')
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
      - name: Download validated publication artifact
        if: steps.freshness.outputs.publish == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: registry-dry-run
          path: dist
      - name: Verify validated publication artifact
        if: steps.freshness.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tools/ci/run-packager-python.sh tools/build-registry.py \
            --check-publication registry.json dist/registry.json dist
          tools/ci/run-packager-python.sh tools/build-registry.py \
            --source-plugins plugins \
            --check-metadata dist/registry.json
      - name: Publish zips to the release
        if: steps.freshness.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
              --title "Plugin artifacts" \
              --notes "Rolling plugin zips for the registry."

          declare -A remote_assets=()
          while IFS= read -r asset; do
            remote_assets["$asset"]=1
          done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')

          shopt -s nullglob
          archives=(dist/*.zip)
          if [[ "${#archives[@]}" -eq 0 ]]; then
            echo "No new plugin versions to upload."
          fi
          for archive in "${archives[@]}"; do
            asset=${archive##*/}
            if [[ -n "${remote_assets[$asset]+present}" ]]; then
              download_dir="$RUNNER_TEMP/release-assets/$asset"
              mkdir -p "$download_dir"
              gh release download "$RELEASE_TAG" \
                --pattern "$asset" \
                --dir "$download_dir"
              if ! cmp -s -- "$archive" "$download_dir/$asset"; then
                echo "::error::$asset already exists with different bytes"
                exit 1
              fi
              echo "Verified existing immutable asset $asset."
            else
              gh release upload "$RELEASE_TAG" "$archive"
              echo "Uploaded immutable asset $asset."
            fi
          done

          verify_root="$RUNNER_TEMP/registry-assets"
          mkdir -p "$verify_root"
          while IFS=$'\t' read -r name version url expected_sha; do
            downloaded="$verify_root/${name}-${version}.zip"
            curl --fail --location --silent --show-error \
              --proto '=https' --proto-redir '=https' \
              --retry 5 --retry-all-errors --retry-delay 2 \
              "$url" --output "$downloaded"
            actual_sha=$(sha256sum "$downloaded" | cut -d ' ' -f 1)
            if [[ "$actual_sha" != "$expected_sha" ]]; then
              echo "::error::$name@$version release digest $actual_sha does not match registry $expected_sha"
              exit 1
            fi
          done < <(
            jq -r '.plugins[] | [.name, .version, .url, .sha256] | @tsv' \
              dist/registry.json
          )
          echo "Verified every registry URL and digest."
      - name: Commit refreshed registry index
        if: steps.freshness.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp dist/registry.json registry.json
          if git diff --quiet -- registry.json; then
            echo "registry.json is already current."
            exit 0
          fi

          git fetch --no-tags origin main
          current_main=$(git rev-parse refs/remotes/origin/main)
          if [[ "$current_main" != "$GITHUB_SHA" ]]; then
            echo "::error::Main advanced to $current_main after release upload; its publication run must reconcile the verified assets"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore: refresh plugin registry index"

          # Retry only transient push failures. Generated registry bytes are
          # never rebased across a newer, unvalidated source revision.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch --no-tags origin main
            current_main=$(git rev-parse refs/remotes/origin/main)
            if git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
              echo "Registry commit reached main despite an ambiguous push response."
              exit 0
            fi
            if [[ "$current_main" != "$GITHUB_SHA" ]]; then
              echo "::error::Main advanced to $current_main; refusing to rebase registry bytes from $GITHUB_SHA"
              exit 1
            fi
            if [[ "$attempt" -eq 3 ]]; then
              break
            fi
            echo "Push failed without a main update; retrying $((attempt + 1))/3."
          done

          echo "::error::Could not push registry.json after three attempts"
          exit 1
